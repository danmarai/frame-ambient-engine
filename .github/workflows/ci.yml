# CI — runs on every push and PR to main
# Tests, type checking, and linting for the cloud server

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check (cloud server)
        run: pnpm --filter @frame/cloud typecheck

      - name: Run tests (cloud server)
        run: pnpm --filter @frame/cloud test

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    # Only build Docker on pushes to main (not PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/cloud/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/cloud:latest
            ghcr.io/${{ github.repository }}/cloud:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
