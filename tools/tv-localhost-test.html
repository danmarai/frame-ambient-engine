<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Frame TV Localhost Test</title>
    <style>
      body {
        background: #111;
        color: #eee;
        font-family: sans-serif;
        padding: 40px;
        font-size: 24px;
      }
      .status {
        margin: 20px 0;
        padding: 20px;
        border-radius: 12px;
      }
      .testing {
        background: #333;
      }
      .success {
        background: #1a4d1a;
      }
      .error {
        background: #4d1a1a;
      }
      .info {
        background: #1a2a4d;
      }
      pre {
        font-size: 16px;
        white-space: pre-wrap;
        word-break: break-all;
      }
      button {
        font-size: 24px;
        padding: 16px 32px;
        margin: 8px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
      }
      .btn-primary {
        background: #4a90d9;
        color: white;
      }
      .btn-secondary {
        background: #555;
        color: white;
      }
    </style>
  </head>
  <body>
    <h1>Samsung Frame TV — Localhost WebSocket Test</h1>
    <p>
      This page tests whether a web app running ON the TV can connect to the
      TV's own WebSocket API at localhost:8002.
    </p>

    <div id="log"></div>

    <div style="margin-top: 20px">
      <button class="btn-primary" onclick="testLocalhost()">
        Test localhost:8002
      </button>
      <button class="btn-secondary" onclick="testLocalIP()">
        Test via TV's IP
      </button>
      <button class="btn-secondary" onclick="clearLog()">Clear</button>
    </div>

    <script>
      function log(msg, type) {
        const div = document.createElement("div");
        div.className = "status " + (type || "testing");
        div.innerHTML = msg;
        document.getElementById("log").appendChild(div);
        // Auto-scroll
        window.scrollTo(0, document.body.scrollHeight);
      }

      function clearLog() {
        document.getElementById("log").innerHTML = "";
      }

      function testWebSocket(url, label) {
        log(`<b>${label}</b>: Connecting to ${url}...`);

        try {
          const ws = new WebSocket(url);
          let gotMessage = false;

          ws.onopen = function () {
            log(`<b>${label}</b>: ✅ WebSocket OPEN!`, "success");
          };

          ws.onmessage = function (event) {
            gotMessage = true;
            try {
              const msg = JSON.parse(event.data);
              log(
                `<b>${label}</b>: 📩 Event: ${msg.event}<br><pre>${JSON.stringify(msg.data || {}, null, 2).substring(0, 500)}</pre>`,
                "info",
              );

              // If we get ms.channel.connect, try sending an art mode status request
              if (msg.event === "ms.channel.connect") {
                log(
                  `<b>${label}</b>: 🎉 CONNECTED TO TV WebSocket! Token: ${msg.data?.token || "none"}`,
                  "success",
                );

                // Wait for ready, then try art mode
                setTimeout(function () {
                  log(`<b>${label}</b>: Sending get_artmode_status...`);
                  ws.send(
                    JSON.stringify({
                      method: "ms.channel.emit",
                      params: {
                        event: "art_app_request",
                        to: "host",
                        data: JSON.stringify({
                          request: "get_artmode_status",
                          id: "test-1",
                        }),
                      },
                    }),
                  );
                }, 2000);
              }

              // Art mode response
              if (msg.event === "d2d_service_message") {
                const inner = JSON.parse(msg.data);
                log(
                  `<b>${label}</b>: 🎨 ART MODE RESPONSE: ${inner.event} = ${inner.value || JSON.stringify(inner).substring(0, 200)}`,
                  "success",
                );
              }
            } catch (e) {
              log(
                `<b>${label}</b>: Raw message: ${event.data.substring(0, 300)}`,
                "info",
              );
            }
          };

          ws.onerror = function (event) {
            log(`<b>${label}</b>: ❌ WebSocket ERROR`, "error");
          };

          ws.onclose = function (event) {
            log(
              `<b>${label}</b>: WebSocket closed (code: ${event.code}, reason: ${event.reason || "none"})`,
              gotMessage ? "info" : "error",
            );
          };

          // Timeout
          setTimeout(function () {
            if (ws.readyState !== WebSocket.CLOSED) {
              log(`<b>${label}</b>: ⏱️ Timeout after 15s`, "testing");
              ws.close();
            }
          }, 15000);
        } catch (e) {
          log(`<b>${label}</b>: ❌ Exception: ${e.message}`, "error");
        }
      }

      function testLocalhost() {
        const name = btoa("FrameTest");

        // Test 1: WSS localhost (most likely path)
        testWebSocket(
          "wss://localhost:8002/api/v2/channels/samsung.remote.control?name=" +
            name +
            "&token=",
          "WSS localhost",
        );

        // Test 2: WS localhost (fallback)
        setTimeout(function () {
          testWebSocket(
            "ws://localhost:8001/api/v2/channels/samsung.remote.control?name=" +
              name +
              "&token=",
            "WS localhost:8001",
          );
        }, 3000);

        // Test 3: WSS 127.0.0.1
        setTimeout(function () {
          testWebSocket(
            "wss://127.0.0.1:8002/api/v2/channels/samsung.remote.control?name=" +
              name +
              "&token=",
            "WSS 127.0.0.1",
          );
        }, 6000);
      }

      function testLocalIP() {
        // Try to detect TV's own IP and connect via that
        const name = btoa("FrameTest");
        const ip = prompt("Enter this TV's IP address:", "10.199.1.210");
        if (!ip) return;

        testWebSocket(
          "wss://" +
            ip +
            ":8002/api/v2/channels/samsung.remote.control?name=" +
            name +
            "&token=",
          "WSS " + ip,
        );
      }
    </script>
  </body>
</html>
