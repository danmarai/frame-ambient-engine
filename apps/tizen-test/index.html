<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
  </head>
  <body
    style="
      background: #0a0a1a;
      color: #eee;
      font-size: 24px;
      padding: 30px;
      font-family: sans-serif;
    "
  >
    <h1 style="color: #ff0; font-size: 32px; margin-bottom: 20px">
      Yuen's TV — Results Only
    </h1>
    <div id="r" style="line-height: 2"></div>
    <script>
      var results = {};
      function show(key, val, good) {
        results[key] = val;
        var el = document.getElementById("r");
        el.innerHTML = "";
        Object.keys(results).forEach(function (k) {
          var v = results[k];
          var color =
            v.good === true ? "#0a3" : v.good === false ? "#a03" : "#335";
          el.innerHTML +=
            "<div style='padding:4px 8px;margin:2px 0;border-radius:4px;background:" +
            color +
            "'>" +
            k +
            ": " +
            v.text +
            "</div>";
        });
      }

      show("Status", { text: "Starting...", good: null });

      // Fetch REST API
      var xhr = new XMLHttpRequest();
      xhr.timeout = 5000;
      xhr.onload = function () {
        try {
          var dev = JSON.parse(xhr.responseText).device;
          show("Model", {
            text: dev.modelName + " (" + dev.model + ")",
            good: true,
          });
          show("Year", { text: "20" + dev.model.substring(0, 2), good: true });
          show("Frame TV", {
            text: dev.FrameTVSupport,
            good: dev.FrameTVSupport === "true",
          });
          show("Resolution", { text: dev.resolution, good: true });
          startWS();
        } catch (e) {
          show("REST API", { text: "parse error", good: false });
        }
      };
      xhr.onerror = function () {
        show("REST API", { text: "failed", good: false });
      };
      xhr.open("GET", "http://localhost:8001/api/v2/", true);
      xhr.send();

      function startWS() {
        show("Status", { text: "Connecting WebSocket...", good: null });
        var ws = new WebSocket(
          "ws://localhost:8001/api/v2/channels/com.samsung.art-app?name=" +
            btoa("YuenTest"),
        );
        ws.onopen = function () {
          show("WS localhost:8001", { text: "OPEN", good: true });
        };
        ws.onerror = function () {
          show("WS localhost:8001", { text: "FAILED", good: false });
        };
        ws.onmessage = function (e) {
          try {
            var msg = JSON.parse(e.data);
            if (msg.event === "ms.channel.ready") {
              show("Channel Ready", { text: "YES", good: true });
              var reqs = [
                { request: "get_api_version", id: "q1" },
                { request: "get_device_info", id: "q2" },
                { request: "get_artmode_status", id: "q3" },
                { request: "get_content_list", id: "q4", category: "MY-C0004" },
                { request: "get_auto_rotation_status", id: "q5" },
              ];
              reqs.forEach(function (r, i) {
                setTimeout(
                  function () {
                    ws.send(
                      JSON.stringify({
                        method: "ms.channel.emit",
                        params: {
                          event: "art_app_request",
                          to: "host",
                          data: JSON.stringify(r),
                        },
                      }),
                    );
                  },
                  (i + 1) * 1000,
                );
              });
              setTimeout(function () {
                show("send_image test", { text: "sending...", good: null });
                ws.send(
                  JSON.stringify({
                    method: "ms.channel.emit",
                    params: {
                      event: "art_app_request",
                      to: "host",
                      data: JSON.stringify({
                        request: "send_image",
                        id: "si",
                        file_type: "jpg",
                        request_id: "si",
                        conn_info: {
                          d2d_mode: "socket",
                          connection_id: 12345,
                          id: "si",
                        },
                        image_date: "2026:04:13 20:00:00",
                        matte_id: "none",
                        portrait_matte_id: "shadowbox_polar",
                        file_size: 50000,
                      }),
                    },
                  }),
                );
                setTimeout(function () {
                  if (!results["send_image FOREGROUND"]) {
                    show("send_image FOREGROUND", {
                      text: "NO RESPONSE (blocked)",
                      good: false,
                    });
                  }
                  show("Status", { text: "DONE", good: true });
                }, 8000);
              }, 8000);
            }
            if (msg.event === "d2d_service_message") {
              var inner = JSON.parse(msg.data);
              if (inner.event === "api_version")
                show("API Version", { text: inner.version, good: true });
              if (inner.event === "get_device_info")
                show("Flash", {
                  text:
                    inner.tv_flash_size +
                    "GB | " +
                    inner.resolution_type +
                    " | Motion:" +
                    inner.support_motion_sensor,
                  good: true,
                });
              if (inner.event === "artmode_status")
                show("Art Mode", { text: inner.value, good: true });
              if (inner.event === "content_list") {
                try {
                  show("Gallery", {
                    text: JSON.parse(inner.content_list).length + " images",
                    good: true,
                  });
                } catch (ex) {
                  show("Gallery", { text: "received", good: true });
                }
              }
              if (inner.event === "auto_rotation_status")
                show("Auto Rotation", { text: inner.value, good: true });
              if (inner.event === "ready_to_use")
                show("send_image FOREGROUND", { text: "YES!!!", good: true });
              if (inner.event === "error" && inner.id === "si")
                show("send_image FOREGROUND", {
                  text: "ERROR " + inner.error_code,
                  good: false,
                });
            }
          } catch (ex) {}
        };
        setTimeout(function () {
          try {
            var ws2 = new WebSocket(
              "wss://localhost:8002/api/v2/channels/com.samsung.art-app?name=" +
                btoa("YuenTest2"),
            );
            ws2.onopen = function () {
              show("WSS localhost:8002", { text: "OPEN!", good: true });
              ws2.close();
            };
            ws2.onerror = function () {
              show("WSS localhost:8002", {
                text: "blocked (cert)",
                good: false,
              });
            };
          } catch (ex) {
            show("WSS localhost:8002", { text: "exception", good: false });
          }
        }, 18000);
      }
    </script>
  </body>
</html>
