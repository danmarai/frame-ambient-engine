<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Curateur — Gallery</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0f0f1a;
        color: #fff;
        min-height: 100vh;
        padding-bottom: 80px;
      }
      .header {
        padding: 12px 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid #222;
        position: sticky;
        top: 0;
        background: #0f0f1a;
        z-index: 10;
      }
      .header h1 {
        font-size: 18px;
        color: #0ff;
      }
      .nav {
        display: flex;
        gap: 16px;
        font-size: 13px;
      }
      .nav a {
        color: #666;
        text-decoration: none;
      }
      .nav a.active,
      .nav a:hover {
        color: #0ff;
      }
      .user-info {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: #888;
      }
      .user-info img {
        width: 24px;
        height: 24px;
        border-radius: 50%;
      }
      .section-title {
        padding: 16px 16px 8px;
        font-size: 15px;
        color: #0ff;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .section-title .count {
        font-size: 12px;
        color: #666;
        font-weight: normal;
      }
      .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 10px;
        padding: 8px 16px;
      }
      .art-card {
        background: #1a1a2e;
        border-radius: 10px;
        overflow: hidden;
        position: relative;
        cursor: pointer;
        transition: transform 0.2s;
      }
      .art-card:hover {
        transform: scale(1.02);
      }
      .art-card.selected {
        outline: 2px solid #0ff;
      }
      .art-card img {
        width: 100%;
        aspect-ratio: 16/9;
        object-fit: cover;
        display: block;
      }
      .art-card .info {
        padding: 6px 8px;
        font-size: 11px;
        color: #888;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .art-card .check {
        position: absolute;
        top: 6px;
        right: 6px;
        width: 22px;
        height: 22px;
        background: rgba(0, 0, 0, 0.6);
        border: 2px solid #555;
        border-radius: 50%;
        display: none;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        color: #0ff;
      }
      .art-card.selected .check {
        display: flex;
        border-color: #0ff;
        background: rgba(0, 255, 255, 0.2);
      }
      .art-card .check::after {
        content: "✓";
      }
      .feedback {
        display: flex;
        gap: 2px;
        padding: 4px 8px 8px;
      }
      .feedback button {
        flex: 1;
        padding: 6px;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        cursor: pointer;
      }
      .btn-up {
        background: #1a2a1a;
      }
      .btn-up:hover,
      .btn-up.active {
        background: #0a5;
      }
      .btn-down {
        background: #2a1a1a;
      }
      .btn-down:hover,
      .btn-down.active {
        background: #a03;
      }
      .action-bar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 10px 16px;
        background: #1a1a2e;
        border-top: 1px solid #333;
        display: none;
      }
      .action-bar.show {
        display: flex;
        gap: 8px;
      }
      .action-bar button {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }
      .action-bar .btn-push {
        background: #0a5;
        color: #fff;
      }
      .action-bar .btn-push:disabled {
        opacity: 0.5;
      }
      .action-bar .btn-clear {
        background: #333;
        color: #aaa;
      }
      .empty {
        text-align: center;
        padding: 40px 20px;
        color: #666;
        grid-column: 1/-1;
      }
      .empty a {
        color: #0ff;
      }
      .status-bar {
        padding: 10px 16px;
        font-size: 13px;
        text-align: center;
      }
      .status-bar.success {
        color: #0a5;
      }
      .status-bar.error {
        color: #a03;
      }
      .login-prompt {
        text-align: center;
        padding: 80px 20px;
      }
      .login-prompt h1 {
        color: #0ff;
        margin-bottom: 8px;
      }
      .login-prompt p {
        color: #666;
        margin-bottom: 24px;
      }
    </style>
  </head>
  <body>
    <div id="loginView" class="login-prompt">
      <h1>Curateur Gallery</h1>
      <p>Sign in to manage your art</p>
      <div
        id="googleBtn"
        style="display: flex; justify-content: center; margin: 24px 0"
      ></div>
    </div>
    <div id="appView" style="display: none">
      <div class="header">
        <h1>Gallery</h1>
        <div class="nav">
          <a href="/pair">Pair</a>
          <a href="/studio">Studio</a>
          <a href="/gallery" class="active">Gallery</a>
        </div>
      </div>

      <div class="section-title">
        Generated Art <span class="count" id="genCount"></span>
      </div>
      <div id="genGrid" class="gallery"></div>

      <div class="section-title">
        On TV <span class="count" id="tvCount"></span>
      </div>
      <div id="tvGrid" class="gallery"></div>

      <div class="status-bar" id="statusBar">
        Tap images to select, then push to TV
      </div>
      <div class="action-bar" id="actionBar">
        <button class="btn-clear" id="clearSelBtn">Clear</button>
        <button class="btn-push" id="pushBtn">Push to TV</button>
      </div>
    </div>
    <script>
      var session = localStorage.getItem("frameArtSession");
      var user = null;
      try {
        user = JSON.parse(localStorage.getItem("frameArtUser") || "null");
      } catch (e) {}
      var pairedTv = null;
      try {
        pairedTv = JSON.parse(localStorage.getItem("pairedTv") || "null");
      } catch (e) {}
      var LOCAL_SERVER = localStorage.getItem("localServer") || "";
      var selectedScenes = new Set();
      var scenes = [];

      function handleGoogleCredential(response) {
        fetch("/api/auth/google", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ idToken: response.credential }),
        })
          .then(function (r) {
            return r.json();
          })
          .then(function (data) {
            if (data.sessionId) {
              session = data.sessionId;
              user = data.user;
              localStorage.setItem("frameArtSession", data.sessionId);
              localStorage.setItem("frameArtUser", JSON.stringify(data.user));
              showApp();
            }
          });
      }
      function showApp() {
        document.getElementById("loginView").style.display = "none";
        document.getElementById("appView").style.display = "block";
        loadScenes();
        if (pairedTv) loadTvArt();
      }

      function loadScenes() {
        fetch("/api/scenes")
          .then(function (r) {
            return r.json();
          })
          .then(function (data) {
            scenes = data || [];
            document.getElementById("genCount").textContent =
              scenes.length + " images";
            var grid = document.getElementById("genGrid");
            if (!scenes.length) {
              grid.innerHTML =
                '<div class="empty">No art yet. <a href="/studio">Generate some!</a></div>';
              return;
            }
            grid.innerHTML = "";
            scenes.forEach(function (s) {
              var card = document.createElement("div");
              card.className =
                "art-card" + (selectedScenes.has(s.sceneId) ? " selected" : "");
              card.dataset.id = s.sceneId;
              card.innerHTML =
                '<div class="check"></div>' +
                '<img src="' +
                s.imageUrl +
                '" alt="Art">' +
                '<div class="info">' +
                (s.prompt || "").substring(0, 40) +
                "</div>" +
                '<div class="feedback">' +
                '<button class="btn-up" onclick="event.stopPropagation();rate(\'' +
                s.sceneId +
                "','up',this)\">👍</button>" +
                '<button class="btn-down" onclick="event.stopPropagation();rate(\'' +
                s.sceneId +
                "','down',this)\">👎</button>" +
                "</div>";
              card.addEventListener("click", function () {
                toggleSelect(s.sceneId, card);
              });
              grid.appendChild(card);
            });
          });
      }

      function loadTvArt() {
        if (!pairedTv || !LOCAL_SERVER) {
          document.getElementById("tvGrid").innerHTML =
            '<div class="empty">Pair a TV and set local bridge to see TV art</div>';
          return;
        }
        fetch(LOCAL_SERVER + "/api/tv/init", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ tvIp: pairedTv.tvIp }),
        })
          .then(function (r) {
            return r.json();
          })
          .then(function (data) {
            var ids = data.imageIds || [];
            document.getElementById("tvCount").textContent =
              ids.length + "/" + data.maxImages + " images";
            var grid = document.getElementById("tvGrid");
            if (!ids.length) {
              grid.innerHTML = '<div class="empty">No art on TV yet</div>';
              return;
            }
            grid.innerHTML = "";
            ids.forEach(function (id) {
              var card = document.createElement("div");
              card.className = "art-card";
              card.innerHTML =
                '<div style="width:100%;aspect-ratio:16/9;background:#223;display:flex;align-items:center;justify-content:center;font-size:12px;color:#556;">' +
                id +
                '</div><div class="info">' +
                id +
                "</div>";
              grid.appendChild(card);
            });
          })
          .catch(function () {
            document.getElementById("tvGrid").innerHTML =
              '<div class="empty">Could not reach TV</div>';
          });
      }

      function toggleSelect(sceneId, card) {
        if (selectedScenes.has(sceneId)) {
          selectedScenes.delete(sceneId);
          card.classList.remove("selected");
        } else {
          selectedScenes.add(sceneId);
          card.classList.add("selected");
        }
        document.getElementById("actionBar").className =
          "action-bar" + (selectedScenes.size > 0 ? " show" : "");
        document.getElementById("pushBtn").textContent =
          "Push " + selectedScenes.size + " to TV";
      }

      document
        .getElementById("clearSelBtn")
        .addEventListener("click", function () {
          selectedScenes.clear();
          document.querySelectorAll(".art-card.selected").forEach(function (c) {
            c.classList.remove("selected");
          });
          document.getElementById("actionBar").className = "action-bar";
        });

      document.getElementById("pushBtn").addEventListener("click", function () {
        if (!pairedTv || !LOCAL_SERVER || selectedScenes.size === 0) return;
        var btn = this;
        btn.disabled = true;
        btn.textContent = "Pushing...";
        setStatus("Uploading " + selectedScenes.size + " images to TV...");

        var ids = Array.from(selectedScenes);
        var idx = 0;
        function pushNext() {
          if (idx >= ids.length) {
            btn.disabled = false;
            btn.textContent = "Push " + ids.length + " to TV";
            setStatus("Done! " + ids.length + " images pushed to TV.", false);
            selectedScenes.clear();
            document
              .querySelectorAll(".art-card.selected")
              .forEach(function (c) {
                c.classList.remove("selected");
              });
            document.getElementById("actionBar").className = "action-bar";
            loadTvArt();
            return;
          }
          var scene = scenes.find(function (s) {
            return s.sceneId === ids[idx];
          });
          if (!scene) {
            idx++;
            pushNext();
            return;
          }
          setStatus("Uploading " + (idx + 1) + "/" + ids.length + "...");
          fetch(LOCAL_SERVER + "/api/upload", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              tvId: pairedTv.tvId,
              tvIp: pairedTv.tvIp,
              imageUrl: window.location.origin + scene.imageUrl,
            }),
          })
            .then(function (r) {
              return r.json();
            })
            .then(function (data) {
              if (data.success) {
                idx++;
                setTimeout(pushNext, 1000);
              } else {
                setStatus("Failed on " + (idx + 1) + ": " + data.error, true);
                btn.disabled = false;
                btn.textContent = "Push to TV";
              }
            })
            .catch(function (e) {
              setStatus("Error: " + e.message, true);
              btn.disabled = false;
              btn.textContent = "Push to TV";
            });
        }
        pushNext();
      });

      function rate(sceneId, rating, btn) {
        var siblings = btn.parentElement.querySelectorAll("button");
        siblings.forEach(function (b) {
          b.classList.remove("active");
        });
        btn.classList.add("active");
        fetch("/api/feedback", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: "Bearer " + session,
          },
          body: JSON.stringify({
            tvId: pairedTv?.tvId || "none",
            contentId: sceneId,
            rating: rating,
          }),
        }).catch(function () {});
      }

      function setStatus(msg, isError) {
        var el = document.getElementById("statusBar");
        el.textContent = msg;
        el.className = "status-bar" + (isError ? " error" : " success");
      }

      if (session && user) {
        fetch("/api/auth/me", {
          headers: { Authorization: "Bearer " + session },
        })
          .then(function (r) {
            if (r.ok) showApp();
            else initLogin();
          })
          .catch(function () {
            initLogin();
          });
      } else {
        window.onload = function () {
          initLogin();
        };
      }
      function initLogin() {
        document.getElementById("loginView").style.display = "block";
        fetch("/api/config")
          .then(function (r) {
            return r.json();
          })
          .then(function (cfg) {
            if (!cfg.googleClientId) {
              showApp();
              return;
            }
            google.accounts.id.initialize({
              client_id: cfg.googleClientId,
              callback: handleGoogleCredential,
            });
            google.accounts.id.renderButton(
              document.getElementById("googleBtn"),
              {
                theme: "filled_blue",
                size: "large",
                shape: "pill",
                width: 300,
              },
            );
          });
      }
    </script>
  </body>
</html>
