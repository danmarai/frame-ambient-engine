<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Curateur — Telemetry</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
        background: #0a0a14;
        color: #ccc;
        padding: 20px;
      }
      h1 {
        color: #0ff;
        font-size: 20px;
        margin-bottom: 16px;
      }
      h2 {
        color: #8cf;
        font-size: 14px;
        margin: 16px 0 8px;
      }
      .sessions {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 20px;
      }
      .session-card {
        background: #161626;
        border: 1px solid #2a2a3e;
        border-radius: 10px;
        padding: 12px;
        cursor: pointer;
      }
      .session-card:hover {
        border-color: #0ff;
      }
      .session-card .id {
        color: #0ff;
        font-size: 13px;
        font-weight: 600;
      }
      .session-card .meta {
        color: #888;
        font-size: 11px;
        margin-top: 4px;
      }
      .log-viewer {
        background: #08080e;
        border: 1px solid #2a2a3e;
        border-radius: 10px;
        padding: 12px;
        max-height: 70vh;
        overflow-y: auto;
      }
      .log-entry {
        margin-bottom: 16px;
        border-bottom: 1px solid #1a1a2e;
        padding-bottom: 12px;
      }
      .log-entry .header {
        color: #0af;
        font-size: 11px;
        margin-bottom: 6px;
      }
      .log-line {
        color: #8cf;
        font-size: 10px;
        line-height: 16px;
        white-space: pre-wrap;
      }
      .log-line.error {
        color: #f88;
      }
      .log-line.upload {
        color: #8f8;
      }
      .back {
        color: #0ff;
        font-size: 13px;
        cursor: pointer;
        margin-bottom: 12px;
        display: inline-block;
      }
      .refresh {
        color: #556;
        font-size: 12px;
        cursor: pointer;
        margin-left: 16px;
      }
      .empty {
        color: #556;
        padding: 40px;
        text-align: center;
      }
      .auto-refresh {
        color: #556;
        font-size: 11px;
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <h1>Telemetry</h1>
    <div id="content"><div class="empty">Loading...</div></div>
    <script>
      var currentSession = null;
      var autoRefreshTimer = null;

      function loadSessions() {
        fetch("/api/telemetry")
          .then(function (r) {
            return r.json();
          })
          .then(function (sessions) {
            if (sessions.length === 0) {
              document.getElementById("content").innerHTML =
                '<div class="empty">No telemetry data yet.<br>Upload logs from the app to see them here.</div>';
              return;
            }
            var html = '<div class="sessions">';
            sessions.sort(function (a, b) {
              return b.lastSeen.localeCompare(a.lastSeen);
            });
            sessions.forEach(function (s) {
              html +=
                '<div class="session-card" onclick="loadSession(\'' +
                s.deviceId +
                "','" +
                s.sessionId +
                "')\">";
              html +=
                '<div class="id">' +
                s.deviceId +
                " / " +
                s.sessionId +
                "</div>";
              html +=
                '<div class="meta">' +
                s.entries +
                " entries | screens: " +
                s.screens.join(", ") +
                " | last: " +
                new Date(s.lastSeen).toLocaleString() +
                "</div>";
              html += "</div>";
            });
            html += "</div>";
            html +=
              '<span class="refresh" onclick="loadSessions()">Refresh</span>';
            document.getElementById("content").innerHTML = html;
          });
      }

      function loadSession(deviceId, sessionId) {
        currentSession = { deviceId: deviceId, sessionId: sessionId };
        fetchSessionLogs();
        // Auto-refresh every 3 seconds
        if (autoRefreshTimer) clearInterval(autoRefreshTimer);
        autoRefreshTimer = setInterval(fetchSessionLogs, 3000);
      }

      function fetchSessionLogs() {
        if (!currentSession) return;
        fetch(
          "/api/telemetry/" +
            currentSession.deviceId +
            "/" +
            currentSession.sessionId,
        )
          .then(function (r) {
            return r.json();
          })
          .then(function (entries) {
            var html =
              '<span class="back" onclick="backToSessions()">← All Sessions</span>';
            html +=
              '<span class="refresh" onclick="fetchSessionLogs()">Refresh</span>';
            html +=
              "<h2>" +
              currentSession.deviceId +
              " / " +
              currentSession.sessionId +
              "</h2>";
            html += '<div class="auto-refresh">Auto-refreshing every 3s</div>';
            html += '<div class="log-viewer">';
            entries.forEach(function (e, idx) {
              html += '<div class="log-entry">';
              html +=
                '<div class="header">#' +
                idx +
                " | " +
                e.screen +
                " | " +
                new Date(e.timestamp).toLocaleString() +
                " | TV: " +
                (e.tvIp || "none") +
                "</div>";
              (e.logs || []).forEach(function (line) {
                var cls = "log-line";
                if (line.indexOf("ERROR") >= 0 || line.indexOf("FAIL") >= 0)
                  cls += " error";
                else if (line.indexOf("UPLOAD") >= 0) cls += " upload";
                html +=
                  '<div class="' + cls + '">' + escapeHtml(line) + "</div>";
              });
              html += "</div>";
            });
            html += "</div>";
            document.getElementById("content").innerHTML = html;
            // Auto-scroll to bottom
            var viewer = document.querySelector(".log-viewer");
            if (viewer) viewer.scrollTop = viewer.scrollHeight;
          });
      }

      function backToSessions() {
        currentSession = null;
        if (autoRefreshTimer) {
          clearInterval(autoRefreshTimer);
          autoRefreshTimer = null;
        }
        loadSessions();
      }

      function escapeHtml(s) {
        return s
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      loadSessions();
    </script>
  </body>
</html>
