<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Curateur — Controls</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0f0f1a;
        color: #fff;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 40px 20px;
      }
      .card {
        background: #1a1a2e;
        border-radius: 20px;
        padding: 32px;
        max-width: 420px;
        width: 100%;
        margin-bottom: 20px;
      }
      h1 {
        font-size: 24px;
        color: #0ff;
        margin-bottom: 8px;
      }
      .subtitle {
        color: #888;
        font-size: 14px;
        margin-bottom: 24px;
      }
      .toggle-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 0;
        border-bottom: 1px solid #2a2a3e;
      }
      .toggle-row:last-child {
        border-bottom: none;
      }
      .toggle-label {
        font-size: 16px;
      }
      .toggle-desc {
        font-size: 12px;
        color: #666;
        margin-top: 4px;
      }
      .toggle {
        position: relative;
        width: 52px;
        height: 28px;
        flex-shrink: 0;
      }
      .toggle input {
        opacity: 0;
        width: 0;
        height: 0;
      }
      .toggle .slider {
        position: absolute;
        inset: 0;
        background: #333;
        border-radius: 28px;
        cursor: pointer;
        transition: 0.3s;
      }
      .toggle .slider:before {
        content: "";
        position: absolute;
        width: 22px;
        height: 22px;
        left: 3px;
        bottom: 3px;
        background: #fff;
        border-radius: 50%;
        transition: 0.3s;
      }
      .toggle input:checked + .slider {
        background: #0ff;
      }
      .toggle input:checked + .slider:before {
        transform: translateX(24px);
      }
      .status-msg {
        text-align: center;
        padding: 12px;
        border-radius: 8px;
        font-size: 14px;
        margin-top: 16px;
        display: none;
      }
      .status-msg.show {
        display: block;
      }
      .status-msg.success {
        background: #1a3a1a;
        color: #6f6;
      }
      .status-msg.error {
        background: #3a1a1a;
        color: #f66;
      }
      .tv-name {
        font-size: 14px;
        color: #0ff;
        margin-bottom: 4px;
      }
      .btn-unpair {
        margin-top: 16px;
        padding: 12px;
        width: 100%;
        background: none;
        border: 1px solid #f66;
        color: #f66;
        border-radius: 12px;
        font-size: 14px;
        cursor: pointer;
      }
      .btn-unpair:hover {
        background: #3a1a1a;
      }
      .no-tv {
        color: #666;
        text-align: center;
        padding: 24px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>TV Controls</h1>
      <p class="subtitle">Manage your Frame TV settings</p>

      <div id="noTv" class="no-tv">
        No TV paired. <a href="/pair" style="color: #0ff">Pair a TV</a> first.
      </div>

      <div id="controls" style="display: none">
        <div class="tv-name" id="tvName"></div>

        <div class="toggle-row">
          <div>
            <div class="toggle-label">Curateur Active</div>
            <div class="toggle-desc">
              When off, your TV returns to Samsung's default Art Mode
            </div>
          </div>
          <label class="toggle">
            <input type="checkbox" id="activeToggle" checked />
            <span class="slider"></span>
          </label>
        </div>

        <div class="status-msg" id="statusMsg"></div>

        <button class="btn-unpair" id="unpairBtn">Unpair this TV</button>
      </div>
    </div>

    <script>
      var session = localStorage.getItem("frameArtSession");
      var savedTv = localStorage.getItem("pairedTv");

      if (!savedTv) {
        document.getElementById("noTv").style.display = "block";
      } else {
        var tv = JSON.parse(savedTv);
        document.getElementById("noTv").style.display = "none";
        document.getElementById("controls").style.display = "block";
        document.getElementById("tvName").textContent = tv.tvId;

        // Fetch current state
        if (session) {
          fetch("/api/tv/status?tvId=" + encodeURIComponent(tv.tvId), {
            headers: { Authorization: "Bearer " + session },
          })
            .then(function (res) {
              return res.json();
            })
            .then(function (data) {
              document.getElementById("activeToggle").checked =
                data.active !== false;
            })
            .catch(function () {});
        }

        // Toggle handler
        document
          .getElementById("activeToggle")
          .addEventListener("change", function () {
            var active = this.checked;
            var statusEl = document.getElementById("statusMsg");

            fetch("/api/tv/toggle", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                Authorization: "Bearer " + session,
              },
              body: JSON.stringify({ tvId: tv.tvId, active: active }),
            })
              .then(function (res) {
                return res.json();
              })
              .then(function (data) {
                if (data.success) {
                  statusEl.textContent = active
                    ? "Curateur enabled — fresh art will be pushed to your TV."
                    : "Curateur paused — your TV will use Samsung's default Art Mode.";
                  statusEl.className = "status-msg show success";
                } else {
                  statusEl.textContent = data.error || "Failed to update";
                  statusEl.className = "status-msg show error";
                }
              })
              .catch(function (err) {
                statusEl.textContent = "Connection error: " + err.message;
                statusEl.className = "status-msg show error";
              });
          });

        // Unpair handler
        document
          .getElementById("unpairBtn")
          .addEventListener("click", function () {
            if (
              confirm("Unpair this TV? You'll need to pair again to push art.")
            ) {
              localStorage.removeItem("pairedTv");
              window.location.href = "/pair";
            }
          });
      }
    </script>
  </body>
</html>
