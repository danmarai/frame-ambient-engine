<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Frame Art — Studio</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0f0f1a;
        color: #fff;
        min-height: 100vh;
        padding-bottom: 80px;
      }
      .header {
        padding: 12px 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid #222;
        position: sticky;
        top: 0;
        background: #0f0f1a;
        z-index: 10;
      }
      .header h1 {
        font-size: 18px;
        color: #0ff;
      }
      .nav {
        display: flex;
        gap: 16px;
        font-size: 13px;
      }
      .nav a {
        color: #666;
        text-decoration: none;
      }
      .nav a.active,
      .nav a:hover {
        color: #0ff;
      }
      .controls {
        padding: 12px 16px;
        background: #1a1a2e;
      }
      .control-row {
        display: flex;
        gap: 8px;
        margin-bottom: 8px;
      }
      .control-row select {
        flex: 1;
        background: #0f0f1a;
        color: #fff;
        border: 1px solid #333;
        padding: 10px;
        border-radius: 8px;
        font-size: 14px;
      }
      .overlay-section {
        padding: 8px 0;
      }
      .overlay-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 6px;
        flex-wrap: wrap;
      }
      .overlay-row label {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 13px;
        color: #888;
      }
      .overlay-row input[type="checkbox"] {
        accent-color: #0ff;
      }
      .overlay-sub {
        display: none;
        margin-left: 24px;
      }
      .overlay-sub.show {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }
      .overlay-sub select,
      .overlay-sub input {
        background: #0f0f1a;
        color: #fff;
        border: 1px solid #333;
        padding: 6px 10px;
        border-radius: 6px;
        font-size: 12px;
      }
      .overlay-sub .label {
        font-size: 11px;
        color: #666;
      }
      .tv-status {
        padding: 8px 12px;
        margin-top: 4px;
        border-radius: 8px;
        font-size: 13px;
      }
      .tv-status.paired {
        background: #143;
        color: #4f4;
      }
      .tv-status.unpaired {
        background: #332;
        color: #fa0;
      }
      .generate-btn {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        background: #0ff;
        color: #000;
        margin-top: 8px;
      }
      .generate-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .generate-btn.generating {
        background: #335;
        color: #0ff;
        animation: pulse 1.5s infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.7;
        }
      }
      .preview {
        padding: 16px;
      }
      .preview img {
        width: 100%;
        border-radius: 12px;
        aspect-ratio: 16/9;
        object-fit: cover;
      }
      .preview-actions {
        display: flex;
        gap: 8px;
        margin-top: 12px;
        align-items: center;
      }
      .preview-actions button {
        padding: 8px 16px;
        border: none;
        border-radius: 8px;
        font-size: 13px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .btn-saved {
        background: #1a3a1a;
        color: #4f4;
        font-size: 12px;
      }
      .btn-icon {
        background: #222;
        color: #888;
        font-size: 16px;
        width: 36px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        border: none;
        cursor: pointer;
      }
      .btn-icon:hover {
        background: #333;
        color: #fff;
      }
      .preview-info {
        margin-top: 12px;
        font-size: 13px;
        color: #888;
        line-height: 1.6;
      }
      .preview-info .label {
        color: #666;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .preview-info .value {
        color: #ccc;
        margin-bottom: 8px;
      }
      .progress {
        padding: 0 16px;
        margin-top: 8px;
      }
      .progress-bar {
        height: 4px;
        background: #222;
        border-radius: 2px;
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        background: #0ff;
        transition: width 1s linear;
        border-radius: 2px;
      }
      .progress-text {
        font-size: 12px;
        color: #666;
        margin-top: 4px;
      }
      .publish-bar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 12px 16px;
        background: #1a1a2e;
        border-top: 1px solid #333;
        display: flex;
        gap: 8px;
      }
      .publish-bar button {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }
      .btn-publish {
        background: #0a5;
        color: #fff;
      }
      .btn-publish:disabled {
        opacity: 0.5;
      }
      .btn-nopair {
        background: #332;
        color: #fa0;
      }
      .status-msg {
        padding: 8px 16px;
        font-size: 13px;
        text-align: center;
      }
      .status-msg.success {
        color: #0a5;
      }
      .status-msg.error {
        color: #a03;
      }
      .debug {
        background: #111;
        border: 1px solid #333;
        border-radius: 8px;
        margin: 8px 16px;
        padding: 10px;
        font-size: 11px;
        color: #666;
        font-family: monospace;
        white-space: pre-wrap;
        max-height: 200px;
        overflow-y: auto;
        display: none;
      }
      .debug.show {
        display: block;
      }
      .login-prompt {
        text-align: center;
        padding: 80px 20px;
      }
      .login-prompt h1 {
        color: #0ff;
        margin-bottom: 8px;
      }
      .login-prompt p {
        color: #666;
        margin-bottom: 24px;
      }
    </style>
  </head>
  <body>
    <div id="loginView" class="login-prompt">
      <h1>Frame Art Studio</h1>
      <p>Sign in to generate art for your TV</p>
      <div
        id="googleBtn"
        style="display: flex; justify-content: center; margin: 24px 0"
      ></div>
    </div>
    <div id="appView" style="display: none">
      <div class="header">
        <h1>Studio</h1>
        <div class="nav">
          <a href="/pair">Pair</a>
          <a href="/studio" class="active">Studio</a>
          <a href="/gallery">Gallery</a>
        </div>
      </div>
      <div class="controls">
        <div class="control-row">
          <select id="themeSelect"></select>
          <select id="styleSelect"></select>
        </div>
        <div class="overlay-section">
          <div class="overlay-row">
            <label><input type="checkbox" id="ovWeather" /> Weather</label>
            <label><input type="checkbox" id="ovMarket" /> Market</label>
            <label><input type="checkbox" id="ovQuote" /> Quote</label>
          </div>
          <div class="overlay-sub" id="weatherOpts">
            <span class="label">City:</span>
            <input
              type="text"
              id="weatherCity"
              placeholder="Auto-detect"
              style="width: 120px"
            />
            <select id="tempUnit">
              <option value="celsius">°C</option>
              <option value="fahrenheit">°F</option>
            </select>
          </div>
          <div class="overlay-sub" id="marketOpts">
            <span class="label">Symbol:</span>
            <select id="marketSymbol">
              <option value="SPY">SPY (S&P 500)</option>
              <option value="BTC" selected>BTC (Bitcoin)</option>
              <option value="QQQ">QQQ (Nasdaq)</option>
              <option value="AAPL">AAPL</option>
              <option value="TSLA">TSLA</option>
            </select>
          </div>
        </div>
        <div id="tvStatus"></div>
        <button class="generate-btn" id="genBtn">Generate Art</button>
      </div>
      <div class="progress" id="progressSection" style="display: none">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill" style="width: 0%"></div>
        </div>
        <div class="progress-text" id="progressText">Starting...</div>
      </div>
      <div class="preview" id="previewSection" style="display: none">
        <img id="previewImg" src="" alt="Generated art" />
        <div class="preview-actions">
          <button class="btn-saved" id="savedBadge">
            &#10003; Saved to Gallery
          </button>
          <button class="btn-icon" id="deleteBtn" title="Delete">
            &#128465;
          </button>
          <button class="btn-icon" id="editBtn" title="Refine & Regenerate">
            &#9998;
          </button>
        </div>
        <div class="preview-info">
          <div class="label">Prompt</div>
          <div class="value" id="promptText"></div>
          <div class="label">Context</div>
          <div class="value" id="contextText"></div>
          <div class="label">Stats</div>
          <div class="value" id="statsText"></div>
        </div>
      </div>
      <div class="status-msg" id="statusMsg"></div>
      <div class="debug" id="debugLog"></div>
      <div class="publish-bar" id="publishBar" style="display: none"></div>
    </div>
    <script>
      var session = localStorage.getItem("frameArtSession");
      var user = null;
      try {
        user = JSON.parse(localStorage.getItem("frameArtUser") || "null");
      } catch (e) {}
      var currentScene = null;
      var pairedTv = null;
      try {
        pairedTv = JSON.parse(localStorage.getItem("pairedTv") || "null");
      } catch (e) {}
      var devices = [];
      var isDebug = window.location.search.includes("debug");
      var LOCAL_SERVER = localStorage.getItem("localServer") || "";
      var localParam = new URLSearchParams(window.location.search).get("local");
      if (localParam) {
        LOCAL_SERVER = "http://" + localParam;
        localStorage.setItem("localServer", LOCAL_SERVER);
      }

      function dbg(msg) {
        if (!isDebug) return;
        var el = document.getElementById("debugLog");
        el.className = "debug show";
        el.textContent += new Date().toLocaleTimeString() + " " + msg + "\n";
        el.scrollTop = el.scrollHeight;
      }

      // Overlay toggles
      document
        .getElementById("ovWeather")
        .addEventListener("change", function () {
          document.getElementById("weatherOpts").className =
            "overlay-sub" + (this.checked ? " show" : "");
          if (this.checked && !document.getElementById("weatherCity").value)
            detectLocation();
        });
      document
        .getElementById("ovMarket")
        .addEventListener("change", function () {
          document.getElementById("marketOpts").className =
            "overlay-sub" + (this.checked ? " show" : "");
        });

      function detectLocation() {
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(function (pos) {
            var lat = pos.coords.latitude.toFixed(2);
            var lon = pos.coords.longitude.toFixed(2);
            localStorage.setItem("weather.lat", lat);
            localStorage.setItem("weather.lon", lon);
            fetch("https://geocode.maps.co/reverse?lat=" + lat + "&lon=" + lon)
              .then(function (r) {
                return r.json();
              })
              .then(function (d) {
                var city =
                  d.address?.city ||
                  d.address?.town ||
                  d.address?.county ||
                  "Detected";
                document.getElementById("weatherCity").value = city;
                localStorage.setItem("weather.city", city);
                dbg("Location: " + city + " (" + lat + ", " + lon + ")");
              })
              .catch(function () {
                document.getElementById("weatherCity").value = "Lat " + lat;
              });
          });
        }
      }

      // Restore saved overlay settings
      var savedCity = localStorage.getItem("weather.city");
      if (savedCity) document.getElementById("weatherCity").value = savedCity;

      // Auth
      function handleGoogleCredential(response) {
        fetch("/api/auth/google", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ idToken: response.credential }),
        })
          .then(function (r) {
            return r.json();
          })
          .then(function (data) {
            if (data.sessionId) {
              session = data.sessionId;
              user = data.user;
              localStorage.setItem("frameArtSession", data.sessionId);
              localStorage.setItem("frameArtUser", JSON.stringify(data.user));
              showApp();
            }
          });
      }
      function showApp() {
        document.getElementById("loginView").style.display = "none";
        document.getElementById("appView").style.display = "block";
        loadConfig();
        loadDevices();
        updateTvStatus();
      }
      function loadConfig() {
        fetch("/api/generation/config")
          .then(function (r) {
            return r.json();
          })
          .then(function (cfg) {
            var themeSel = document.getElementById("themeSelect");
            var savedTheme = localStorage.getItem("studio.theme") || "forest";
            cfg.themes.forEach(function (t) {
              var o = document.createElement("option");
              o.value = t.id;
              o.textContent = t.label;
              if (t.id === savedTheme) o.selected = true;
              themeSel.appendChild(o);
            });
            themeSel.addEventListener("change", function () {
              localStorage.setItem("studio.theme", themeSel.value);
            });
            var styleSel = document.getElementById("styleSelect");
            var savedStyle =
              localStorage.getItem("studio.style") || "photorealistic";
            cfg.styles.forEach(function (s) {
              var o = document.createElement("option");
              o.value = s.id;
              o.textContent = s.label;
              if (s.id === savedStyle) o.selected = true;
              styleSel.appendChild(o);
            });
            styleSel.addEventListener("change", function () {
              localStorage.setItem("studio.style", styleSel.value);
            });
          });
      }
      function loadDevices() {
        fetch("/api/devices")
          .then(function (r) {
            return r.json();
          })
          .then(function (d) {
            devices = d;
            updateTvStatus();
          });
      }

      function updateTvStatus() {
        var el = document.getElementById("tvStatus");
        var bar = document.getElementById("publishBar");
        if (pairedTv && pairedTv.tvIp) {
          el.innerHTML =
            '<div class="tv-status paired">&#9679; TV paired: ' +
            pairedTv.tvIp +
            (LOCAL_SERVER ? " (bridge: " + LOCAL_SERVER + ")" : "") +
            "</div>";
          if (currentScene) {
            bar.style.display = "flex";
            bar.innerHTML =
              '<button class="btn-publish" id="publishBtn">Publish to TV</button>';
            document
              .getElementById("publishBtn")
              .addEventListener("click", doPublish);
          }
        } else {
          el.innerHTML =
            '<div class="tv-status unpaired">No TV paired. <a href="/pair" style="color:#0ff;">Pair your Frame TV</a></div>';
          if (currentScene) {
            bar.style.display = "flex";
            bar.innerHTML =
              '<button class="btn-nopair" onclick="location.href=\'/pair\'">Pair a TV first</button>';
          }
        }
      }

      // Generate
      document.getElementById("genBtn").addEventListener("click", function () {
        var btn = this;
        btn.disabled = true;
        btn.textContent = "Generating...";
        btn.className = "generate-btn generating";
        document.getElementById("progressSection").style.display = "block";
        document.getElementById("previewSection").style.display = "none";
        document.getElementById("publishBar").style.display = "none";
        var startTime = Date.now();
        var progressTimer = setInterval(function () {
          var elapsed = Math.floor((Date.now() - startTime) / 1000);
          document.getElementById("progressFill").style.width =
            Math.min(95, (elapsed / 35) * 100) + "%";
          var msg =
            elapsed < 5
              ? "Gathering weather & context..."
              : elapsed < 15
                ? "Composing prompt..."
                : elapsed < 30
                  ? "AI is painting..."
                  : "Almost done...";
          document.getElementById("progressText").textContent =
            msg + " (" + elapsed + "s)";
        }, 1000);
        var body = {
          theme: document.getElementById("themeSelect").value || "forest",
          imageStyle:
            document.getElementById("styleSelect").value || "photorealistic",
          provider: "openai",
          overlays: {
            showWeather: document.getElementById("ovWeather").checked,
            showMarket: document.getElementById("ovMarket").checked,
            showQuote: document.getElementById("ovQuote").checked,
          },
        };
        dbg("Generate: " + JSON.stringify(body));
        fetch("/api/generate", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: session ? "Bearer " + session : "",
          },
          body: JSON.stringify(body),
        })
          .then(function (r) {
            dbg("Response: " + r.status);
            return r.json();
          })
          .then(function (data) {
            clearInterval(progressTimer);
            document.getElementById("progressSection").style.display = "none";
            btn.disabled = false;
            btn.textContent = "Generate Art";
            btn.className = "generate-btn";
            if (data.error) {
              setStatus(data.error, true);
              dbg("Error: " + data.error);
              return;
            }
            currentScene = data;
            document.getElementById("previewSection").style.display = "block";
            document.getElementById("previewImg").src = data.imageUrl;
            document.getElementById("promptText").textContent =
              data.prompt || "";
            var ctx = data.context || {};
            var parts = [];
            if (ctx.weather)
              parts.push(
                "Weather: " +
                  (ctx.weather.description || ctx.weather.sky || ""),
              );
            if (ctx.market)
              parts.push(
                "Market: " +
                  (ctx.market.symbol || "") +
                  " " +
                  ((ctx.market.changePercent || 0) > 0 ? "+" : "") +
                  (ctx.market.changePercent || 0).toFixed(2) +
                  "%",
              );
            if (ctx.quote) parts.push('"' + (ctx.quote.text || "") + '"');
            document.getElementById("contextText").textContent =
              parts.join(" | ") || "No context";
            document.getElementById("statsText").textContent =
              (data.durationMs / 1000).toFixed(1) + "s via " + data.provider;
            updateTvStatus();
            setStatus("Art generated and saved to gallery!", false);
            dbg("Scene: " + data.sceneId + " " + data.durationMs + "ms");
          })
          .catch(function (err) {
            clearInterval(progressTimer);
            document.getElementById("progressSection").style.display = "none";
            btn.disabled = false;
            btn.textContent = "Generate Art";
            btn.className = "generate-btn";
            setStatus("Error: " + err.message, true);
            dbg("Fetch error: " + err.message);
          });
      });

      function doPublish() {
        if (!currentScene || !pairedTv) return;
        var btn = document.getElementById("publishBtn");
        btn.disabled = true;
        btn.textContent = "Publishing...";
        var uploadServer = LOCAL_SERVER || window.location.origin;
        var imageSource = window.location.origin + currentScene.imageUrl;
        setStatus(
          "Uploading via " + (LOCAL_SERVER ? "local bridge" : "cloud") + "...",
        );
        dbg("Publish: " + uploadServer + " image: " + imageSource);
        fetch(uploadServer + "/api/upload", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            tvId: pairedTv.tvId,
            tvIp: pairedTv.tvIp,
            imageUrl: imageSource,
          }),
        })
          .then(function (r) {
            return r.json();
          })
          .then(function (data) {
            dbg("Upload result: " + JSON.stringify(data));
            if (data.success) {
              setStatus(
                "Published! (" +
                  data.contentId +
                  ", " +
                  (data.durationMs / 1000).toFixed(1) +
                  "s) — displaying on TV",
                false,
              );
              fetch(uploadServer + "/api/set-display", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  tvIp: pairedTv.tvIp,
                  contentId: data.contentId,
                }),
              }).catch(function () {});
            } else {
              setStatus("Publish failed: " + (data.error || "unknown"), true);
            }
            btn.disabled = false;
            btn.textContent = "Publish to TV";
          })
          .catch(function (err) {
            setStatus("Publish error: " + err.message, true);
            dbg("Publish error: " + err.message);
            btn.disabled = false;
            btn.textContent = "Publish to TV";
          });
      }

      document
        .getElementById("deleteBtn")
        .addEventListener("click", function () {
          if (currentScene && confirm("Delete this image?")) {
            document.getElementById("previewSection").style.display = "none";
            document.getElementById("publishBar").style.display = "none";
            currentScene = null;
            setStatus("Image deleted.", false);
          }
        });
      document.getElementById("editBtn").addEventListener("click", function () {
        if (currentScene) {
          var feedback = prompt(
            "What would you change? (e.g., 'more vibrant', 'add mountains')",
          );
          if (feedback) {
            setStatus("Regenerating with: " + feedback, false);
            document.getElementById("genBtn").click();
          }
        }
      });
      function setStatus(msg, isError) {
        var el = document.getElementById("statusMsg");
        el.textContent = msg;
        el.className = "status-msg " + (isError ? "error" : "success");
      }

      if (session && user) {
        fetch("/api/auth/me", {
          headers: { Authorization: "Bearer " + session },
        })
          .then(function (r) {
            if (r.ok) showApp();
            else initLogin();
          })
          .catch(function () {
            initLogin();
          });
      } else {
        window.onload = function () {
          initLogin();
        };
      }
      function initLogin() {
        document.getElementById("loginView").style.display = "block";
        fetch("/api/config")
          .then(function (r) {
            return r.json();
          })
          .then(function (cfg) {
            if (!cfg.googleClientId) {
              showApp();
              return;
            }
            google.accounts.id.initialize({
              client_id: cfg.googleClientId,
              callback: handleGoogleCredential,
            });
            google.accounts.id.renderButton(
              document.getElementById("googleBtn"),
              {
                theme: "filled_blue",
                size: "large",
                shape: "pill",
                width: 300,
              },
            );
          });
      }
    </script>
  </body>
</html>
